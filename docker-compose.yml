services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: payroll_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/payroll_db
      SECRET_KEY: change-me
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-GENERATE_AND_STORE_SECURELY}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      BANK_FILE_STORAGE_DIR: storage/bank_files
    ports:
      - "9000:9000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/payroll_db
      SECRET_KEY: change-me
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-GENERATE_AND_STORE_SECURELY}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      BANK_FILE_STORAGE_DIR: storage/bank_files
    command: ["celery", "-A", "celery_app.celery_app", "worker", "-l", "INFO"]
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:9000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:

