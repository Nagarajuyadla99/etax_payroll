# Copy to /etc/nginx/sites-available/yourapp then symlink into sites-enabled.
# Replace `your-domain` with your real hostname or `_` for default.
#
# IMPORTANT: proxy_pass must NOT use a trailing URI (no `http://127.0.0.1:9000/` here)
# for location /api — otherwise nginx strips /api and FastAPI routes break.

server {
    listen 80;
    server_name your-domain;

    root /var/www/yourapp/frontend/build;
    index index.html;

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI — preserve full path (/api/...)
    location /api {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: expose health through nginx (same as curl on :9000)
    location = /health {
        proxy_pass http://127.0.0.1:9000/health;
        proxy_set_header Host $host;
    }
}
