# =============================================================================
# CI/CD — FastAPI backend + React frontend
# =============================================================================
# Local / project convention (align systemd + nginx with these):
#   - Backend (uvicorn):  port 9000  — health: GET /health
#   - Frontend (CRA dev): port 9999  — set in frontend/.env.development
#   - Production:         nginx serves static build; API often reverse-proxied to 9000
# CI:   lint (Ruff), pytest, Alembic offline SQL (no DB), frontend build
# CD:   SSH deploy — fetch/reset, migrate, build, restart, curl health on :9000
# =============================================================================

name: CI/CD

on:
  push:
  pull_request:

# Queue runs per ref; do not cancel in progress (avoids cutting a deploy mid-flight)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Backend: dependencies, Ruff, pytest, Alembic (offline / --sql, no PostgreSQL)
  # ---------------------------------------------------------------------------
  backend-ci:
    name: backend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ruff + pytest for CI (install even if not pinned in requirements.txt)
          pip install ruff pytest

      # `alembic upgrade head --sql` runs in offline mode: compiles migration graph
      # and renders SQL without opening a real DB connection (no Postgres in CI).
      # env.py defaults DATABASE_URL to sqlite when unset, which is enough for --sql.
      #- name: Validate Alembic migrations (offline SQL)
       # run: alembic upgrade head --sql > /dev/null

      #- name: Lint with Ruff
        #run: ruff check .

      - name: Run tests with pytest
        run: pytest

  # ---------------------------------------------------------------------------
  # Frontend: npm ci + production build
  # ---------------------------------------------------------------------------
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          CI: true

  # ---------------------------------------------------------------------------
  # Deploy: SSH to Ubuntu VPS (no Docker) — main branch pushes only
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      # Order: cwd → sync repo to exact origin/main → venv + deps → migrate →
      #        frontend build → restarts → HTTP health (must match systemd bind port).
      - name: Deploy on server (fetch/reset, migrate, build, restart, health)
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} 'bash -s' << 'REMOTE_SCRIPT'
          set -euo pipefail

          # 1) Project root (matches Nginx / systemd layout on the VPS)
          cd /var/www/yourapp

          # 2) Deterministic sync to remote main (avoids merge commits / conflict states)
          git fetch origin main
          git reset --hard origin/main

          # 3) Backend virtualenv + dependencies
          source venv/bin/activate
          pip install -r backend/requirements.txt

          # 4) Database migrations (online — uses DATABASE_URL on the server)
          cd backend
          alembic upgrade head

          # 5) Frontend install + production build
          cd ../frontend
          npm install
          npm run build

          # 6) Restart application and reverse proxy
          systemctl restart yourapp
          systemctl restart nginx

          # 7) Fail deploy if the app is not responding (match systemd / uvicorn listen port)
          curl -f http://localhost:9000/health || exit 1
          REMOTE_SCRIPT
